# cargo-deny configuration for SoroTask contract
# Docs: https://embarkstudios.github.io/cargo-deny/

# ── Advisories ───────────────────────────────────────────────────────────────
# Fail the build when known security advisories are found.
[advisories]
# The path to the advisory database.
db-path = "~/.cargo/advisory-db"
db-urls = ["https://github.com/rustsec/advisory-db"]

# Check direct workspace dependencies for unmaintained advisories.
unmaintained = "workspace"

# Reject crates with unsound code advisories
unsound = "all"

# Known transitive warnings from the current Soroban SDK dependency tree.
ignore = [
  "RUSTSEC-2024-0388",
  "RUSTSEC-2024-0436",
]

# ── Licenses ─────────────────────────────────────────────────────────────────
# Only allow OSI-approved and permissive licenses.
[licenses]
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "ISC",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "Unicode-DFS-2016",
  "Zlib",
]

# ── Bans ─────────────────────────────────────────────────────────────────────
# Deny duplicate versions of the same crate and flag known-bad crates.
[bans]
# Warn on multiple versions of the same dependency
multiple-versions = "warn"

# Deny wildcard dependencies (e.g. foo = "*")
wildcards = "deny"

# Crates that are explicitly banned from the dependency tree
deny = []

# ── Sources ───────────────────────────────────────────────────────────────────
# Only allow crates from crates.io and verified git sources.
[sources]
# Deny crates from unknown registries
unknown-registry = "deny"

# Deny crates from unknown git sources
unknown-git = "deny"

# Allow crates.io as the default registry
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
