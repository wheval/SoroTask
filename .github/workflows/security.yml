name: Security Scanning

on:
  push:
    branches: [ "main" ]
    paths:
      - 'contract/**'
      - '.github/workflows/security.yml'
  pull_request:
    branches: [ "main" ]
    paths:
      - 'contract/**'
      - '.github/workflows/security.yml'

defaults:
  run:
    working-directory: ./contract

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-audit:
    name: Audit Dependencies (cargo-audit)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo registry
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./contract -> target"

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo-audit
        # --deny warnings escalates all advisories to errors.
        # The build will fail if any high-severity vulnerability is found.
        run: cargo audit --deny warnings --ignore RUSTSEC-2024-0388 --ignore RUSTSEC-2024-0436

  cargo-deny:
    name: Check Licenses & Bans (cargo-deny)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Run cargo-deny
        uses: EmbarkStudios/cargo-deny-action@v2
        with:
          manifest-path: contract/Cargo.toml
          # Fail on: advisories (CVEs), bans, licenses, sources
          command: check advisories bans licenses sources
