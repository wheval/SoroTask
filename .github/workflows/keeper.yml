name: Keeper CI

on:
  push:
    branches: [ "main", "feat/*", "fix/*" ]
    paths:
      - 'keeper/**'
      - '.github/workflows/keeper.yml'
  pull_request:
    branches: [ "main", "feat/*" ]
    paths:
      - 'keeper/**'
      - '.github/workflows/keeper.yml'

# This ensures all 'run' commands happen inside the Keeper directory
defaults:
  run:
    working-directory: ./keeper

env:
  NODE_ENV: test

jobs:
  lint-and-test:
    name: Lint, Test, and Coverage
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [20.x]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js ${{ matrix.node-version }}
        uses: actions/setup-node@v6
        with:
          node-version: ${{ matrix.node-version }}
          cache: 'npm'
          cache-dependency-path: './keeper/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run ESLint
        run: npm run lint

      - name: Run Unit Tests
        run: npm test

      - name: Run Tests with Coverage
        run: npm run test:cov

      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v6
        with:
          files: ./keeper/coverage/lcov.info
          flags: keeper
          name: keeper-node-${{ matrix.node-version }}
          fail_ci_if_error: false

  coverage-threshold:
    name: Coverage Threshold Check
    runs-on: ubuntu-latest
    needs: lint-and-test

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 20.x
          cache: 'npm'
          cache-dependency-path: './keeper/package-lock.json'

      - name: Install dependencies
        run: npm ci

      - name: Run coverage check
        run: npm run test:cov

      - name: Check coverage threshold (80%)
        run: |
          COVERAGE=$(cat coverage/coverage-summary.json | jq -r '.total.lines.pct')
          echo "Line coverage: ${COVERAGE}%"
          if (( $(echo "$COVERAGE < 80" | bc -l) )); then
            echo "Coverage ${COVERAGE}% is below threshold of 80%"
            exit 1
          fi
          echo "Coverage check passed!"
