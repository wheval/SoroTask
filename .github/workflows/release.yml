name: Contract Release Assets

on:
  release:
    types:
      - published

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    if: startsWith(github.event.release.tag_name, 'soro_task_contract-v')
    name: Build and Release Wasm Artifact
    runs-on: ubuntu-latest
    
    defaults:
      run:
        working-directory: ./contract

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Cargo Registry & Build Artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: "./contract -> target"

      - name: Build Release Wasm
        run: cargo build --target wasm32-unknown-unknown --release

      - name: Calculate SHA256 Hash
        run: |
          WASM_PATH="target/wasm32-unknown-unknown/release/soro_task.wasm"
          if [ ! -f "$WASM_PATH" ]; then
            echo "Error: Wasm artifact not found at $WASM_PATH"
            exit 1
          fi
          SHA256_HASH=$(sha256sum "$WASM_PATH" | awk '{ print $1 }')
          printf '%s  %s\n' "$SHA256_HASH" "soro_task.wasm" > soro_task.wasm.sha256
          echo "Wasm SHA256: $SHA256_HASH"
          echo ""
          echo "--- Artifact Details ---"
          echo "File: soro_task.wasm"
          echo "Size: $(stat -c%s "$WASM_PATH") bytes"
          echo "SHA256: $SHA256_HASH"
          echo "------------------------"

      - name: Upload release assets
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ github.event.release.tag_name }}
          files: |
            contract/target/wasm32-unknown-unknown/release/soro_task.wasm
            contract/soro_task.wasm.sha256
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Print Release Summary
        run: |
          echo "========================================"
          echo "Assets uploaded to release ${{ github.event.release.tag_name }}!"
          echo "========================================"
          echo "Artifact: soro_task.wasm"
          echo "Checksum file: soro_task.wasm.sha256"
          echo "========================================"
