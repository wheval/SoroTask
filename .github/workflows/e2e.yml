name: E2E Test Suite

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  e2e:
    name: Run E2E Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Modern Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32v1-none

      - name: Install stellar-cli
        uses: stellar/stellar-cli@v23.0.1

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: keeper/package-lock.json

      - name: Install Keeper Dependencies
        run: |
          cd keeper
          npm install

      - name: Start Soroban Network
        run: |
          chmod +x scripts/start-network.sh
          ./scripts/start-network.sh

      - name: Setup Contracts
        run: |
          chmod +x scripts/setup-contracts.sh
          ./scripts/setup-contracts.sh

      - name: Run E2E Test
        run: |
          cd keeper
          node __tests__/e2e-run.js

      - name: Export Logs on Failure
        if: failure()
        run: |
          docker logs soroban-local || echo "Container soroban-local not found"
          docker ps -a
